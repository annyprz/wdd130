<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Exciting Expeditions ">
    <meta name="author" content="Valeria Perez">
    <tittle> Contact Us | Exciting Expeditions</tittle>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Loco">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="company-info">
            <h1>White Water Rafting Company</h1>

            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>Phone: (123) 456-7890</p>
            <p>Email: info@whitewater.com</p>
        </section>
        <div class="contact-layout">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12671.649563607609!2d-113.05979614115368!3d37.439174353145994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80ca96f62dde7a45%3A0xa62cd4a5e874f85e!2sKolob%20Reservoir!5e0!3m2!1sen!2sus!4v1781767599040!5m2!1sen!2sus"
              width="600" height="450" " allowfullscreen=""
            loading=" lazy"></iframe>
            </iframe>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

                <p>Message Purpose:</p>

                <input type="radio" id="general" name="purpose">
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose">
                <label for="suggestion">Website Suggestion</label>

                <label for="message">Message:</label>
                <textarea id="message"></textarea>

                <input type="checkbox" id="newsletter">
                <label for="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get In Touch!</button>
            </form>
        </div>
        <section class="employees">
            <figure>
                <img src="images/guide1.jpg" alt="River  Guide">
                <figcaption>Sarah Johnson - River Guide</figcaption>
            </figure>
            <figure>
                <img src="images/guide2.jpg" alt="Trip Manager">
                <figcaption>Mike Davis - Trip Manager</figcaption>
            </figure>
            <figure>
                <img src="images/guide3.jpg" alt="Safety Instructor">
                <figcaption>John Wilson - Safety Instructor</figcaption>
            </figure>
        </section>
    </main>


    <footer>
        <p>&copy; 2026 Exciting Expeditions | Valeria Perez</p>
        <nav class="socialmedia">
            <a href="#">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="#">
                <img src="images/instagram.png" alt="Instagram">
            </a>
            <a href="#">
                <img src="images/linkedin.png" alt="LinkedIn">
            </a>
        </nav>

    </footer>
</body>

</html>
